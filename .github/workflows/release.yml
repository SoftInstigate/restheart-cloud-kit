name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: integration-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g npm@latest

      - run: npm ci

      - name: Set version from tag
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version -w packages/kit
          npm version ${{ github.ref_name }} --no-git-tag-version -w packages/kit-ng

      - run: npm run build

      - run: mkdir -p packages/kit/test-results

      - name: Integration tests
        run: npm test -w @restheart-cloud/kit
        env:
          RH_TEST_API_URL: ${{ secrets.RH_TEST_API_URL }}
          RH_TEST_ADMIN_PASSWORD: ${{ secrets.RH_TEST_ADMIN_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/kit/test-results/

      - name: Publish
        if: success()
        run: |
          npm --version
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo yes || echo no)"
          npm publish --access public -w packages/kit
          npm publish --access public -w packages/kit-ng
