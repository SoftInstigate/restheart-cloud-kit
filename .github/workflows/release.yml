name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: integration-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      # Check whether there are pending changeset files.
      # If yes  → changesets will open/update the Version PR  (no publish yet, skip tests).
      # If no   → the Version PR was just merged → run tests, then publish.
      - name: Check for pending changesets
        id: changesets
        run: |
          count=$(find .changeset -name "*.md" -not -name "README.md" | wc -l | tr -d ' ')
          echo "pending=$([ "$count" -gt "0" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Integration tests
        if: steps.changesets.outputs.pending == 'false'
        run: npm test -w @restheart-cloud/kit
        env:
          RH_TEST_API_URL: ${{ secrets.RH_TEST_API_URL }}
          RH_TEST_ADMIN_PASSWORD: ${{ secrets.RH_TEST_ADMIN_PASSWORD }}

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "🔖 chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
